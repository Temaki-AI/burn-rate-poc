<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burn Rate — Funko Character Editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0f0f1a;font-family:'Inter',sans-serif;color:#fff;}
#app{display:flex;width:100%;height:100%;}
#viewport{flex:0 0 55%;height:100%;position:relative;}
#viewport canvas{display:block;}
#panel{flex:0 0 45%;height:100%;overflow-y:auto;background:#161625;border-left:1px solid #2a2a40;padding:20px;}
#panel::-webkit-scrollbar{width:6px;}
#panel::-webkit-scrollbar-track{background:#161625;}
#panel::-webkit-scrollbar-thumb{background:#00d4ff33;border-radius:3px;}
.section{margin-bottom:18px;}
.section-title{font-size:11px;font-weight:700;color:#00d4ff;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #2a2a40;}
.ctrl{display:flex;align-items:center;margin-bottom:6px;font-size:12px;}
.ctrl label{flex:0 0 35%;color:#999;}
.ctrl input[type=color]{width:32px;height:22px;border:1px solid #444;border-radius:4px;background:transparent;cursor:pointer;padding:0;}
.ctrl input[type=range]{flex:1;accent-color:#00d4ff;height:4px;}
.ctrl select{flex:1;background:#1a1a2e;color:#fff;border:1px solid #333;border-radius:6px;padding:4px 8px;font-size:11px;}
.ctrl input[type=checkbox]{accent-color:#00d4ff;width:15px;height:15px;}
.val{color:#00d4ff;font-size:10px;width:32px;text-align:right;margin-left:4px;font-weight:600;}
.btn-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.btn{padding:6px 12px;border:1px solid #333;border-radius:8px;background:#1a1a2e;color:#fff;font-size:11px;cursor:pointer;transition:all .15s;font-weight:500;}
.btn:hover{border-color:#00d4ff;background:#1a2a4e;}
.btn.active{border-color:#00d4ff;background:#00d4ff18;color:#00d4ff;}
#info{position:absolute;bottom:12px;left:12px;font-size:10px;color:#666;pointer-events:none;}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.color-swatch{width:28px;height:28px;border-radius:6px;border:2px solid #333;cursor:pointer;transition:all .15s;}
.color-swatch:hover,.color-swatch.active{border-color:#00d4ff;transform:scale(1.15);}
</style>
</head>
<body>
<div id="app">
  <div id="viewport">
    <div id="info">Burn Rate — Funko Character Editor v2 • drag to orbit</div>
  </div>
  <div id="panel">
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:20px;font-weight:800;background:linear-gradient(90deg,#00d4ff,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">🔥 CHARACTER EDITOR</div>
      <div style="font-size:10px;color:#666;margin-top:2px;">Funko Pop Base • Burn Rate</div>
    </div>
    <div class="section"><div class="section-title">⚡ Role Presets</div><div class="btn-row" id="presetRow"></div></div>
    <div class="section"><div class="section-title">🎨 Skin Tone</div><div class="color-row" id="skinRow"></div><div class="ctrl"><label>Custom</label><input type="color" id="skinColor" value="#F5D0A9"></div></div>
    <div class="section"><div class="section-title">💇 Hair</div>
      <div class="ctrl"><label>Style</label><select id="hairStyle"><option value="none">Bald</option><option value="buzz">Buzz Cut</option><option value="spiky">Spiky</option><option value="slickback">Slick Back</option><option value="topbun">Top Bun</option><option value="ponytail">Ponytail</option><option value="afro">Afro</option><option value="mohawk">Mohawk</option><option value="sidepart">Side Part</option><option value="messy">Messy</option><option value="curly">Curly</option><option value="bob">Bob</option></select></div>
      <div class="ctrl"><label>Color</label><input type="color" id="hairColor" value="#3D2B1F"></div>
    </div>
    <div class="section"><div class="section-title">👕 Clothing</div>
      <div class="ctrl"><label>Shirt</label><input type="color" id="shirtColor" value="#2196F3"></div>
      <div class="ctrl"><label>Pants</label><input type="color" id="pantsColor" value="#37474F"></div>
      <div class="ctrl"><label>Shoes</label><input type="color" id="shoeColor" value="#212121"></div>
    </div>
    <div class="section"><div class="section-title">👀 Eyes</div>
      <div class="ctrl"><label>Color</label><input type="color" id="eyeColor" value="#000000"></div>
      <div class="ctrl"><label>Size</label><input type="range" id="eyeScale" min="0.5" max="1.8" step="0.05" value="1.0"><span class="val" id="eyeScaleVal">1.0</span></div>
    </div>
    <div class="section"><div class="section-title">🎒 Accessories</div>
      <div class="ctrl"><label>Glasses</label><input type="checkbox" id="accGlasses"></div>
      <div class="ctrl"><label>Headphones</label><input type="checkbox" id="accHeadphones"></div>
      <div class="ctrl"><label>Beard</label><input type="checkbox" id="accBeard"></div>
      <div class="ctrl"><label>Hat</label><select id="hatStyle"><option value="none">None</option><option value="beanie">Beanie</option><option value="cap">Cap</option><option value="tophat">Top Hat</option></select></div>
      <div class="ctrl"><label>Lanyard</label><input type="checkbox" id="accLanyard"></div>
    </div>
    <div class="section"><div class="section-title">📐 Proportions</div>
      <div class="ctrl"><label>Head Size</label><input type="range" id="headScale" min="0.85" max="1.25" step="0.01" value="1.0"><span class="val" id="headScaleVal">1.0</span></div>
      <div class="ctrl"><label>Body Width</label><input type="range" id="bodyWidth" min="0.8" max="1.3" step="0.01" value="1.0"><span class="val" id="bodyWidthVal">1.0</span></div>
    </div>
    <div class="section"><div class="section-title">🎬 Animation</div>
      <div class="btn-row">
        <button class="btn active" onclick="setAnim('idle')">Idle</button>
        <button class="btn" onclick="setAnim('walk')">Walk</button>
        <button class="btn" onclick="setAnim('wave')">Wave</button>
        <button class="btn" onclick="setAnim('sit')">Sit</button>
      </div>
      <div class="ctrl"><label>Turntable</label><input type="checkbox" id="turntable" checked></div>
    </div>
    <div class="section"><div class="section-title">🛠 Actions</div>
      <div class="btn-row">
        <button class="btn" onclick="randomize()">🎲 Randomize</button>
        <button class="btn" onclick="copyJSON()">📋 Copy JSON</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.143.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.143.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.143.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
var scene,camera,renderer,controls,clock;
var baseModel=null,character=null,accessories={},hairGroup=null;
var currentAnim='idle',animTime=0;

var MESH_NAMES={head:'Head M_Material_0',eyes:'Eyes M_eyes_0',nose:' M__0',ears:'Ears M_Material_0',upperBody:'UpperBody M__0',hands:'Hands M_Material_0',lowerBody:'LowerBody F__0'};

var SKIN_PRESETS=[
  {name:'Light',hex:'#FDDCB5'},{name:'Peach',hex:'#F5D0A9'},{name:'Tan',hex:'#D4A574'},
  {name:'Brown',hex:'#A0734A'},{name:'Dark',hex:'#6B4226'},{name:'Ebony',hex:'#3B2219'},
  {name:'Olive',hex:'#C4A882'},{name:'Rosy',hex:'#F0C0A0'}
];

var ROLE_PRESETS={
  engineer:{skin:'#F5D0A9',hair:'spiky',hairColor:'#3D2B1F',shirt:'#1565C0',pants:'#37474F',shoes:'#212121',eyes:'#000000',hat:'none',glasses:false,headphones:true,beard:false,lanyard:true},
  designer:{skin:'#FDDCB5',hair:'bob',hairColor:'#E91E63',shirt:'#9C27B0',pants:'#212121',shoes:'#E0E0E0',eyes:'#000000',hat:'none',glasses:true,headphones:false,beard:false,lanyard:false},
  pm:{skin:'#D4A574',hair:'sidepart',hairColor:'#1B1B1B',shirt:'#FFFFFF',pants:'#1565C0',shoes:'#5D4037',eyes:'#000000',hat:'none',glasses:true,headphones:false,beard:false,lanyard:true},
  sales:{skin:'#F5D0A9',hair:'slickback',hairColor:'#3E2723',shirt:'#F44336',pants:'#263238',shoes:'#212121',eyes:'#000000',hat:'none',glasses:false,headphones:false,beard:false,lanyard:true},
  ceo:{skin:'#D4A574',hair:'slickback',hairColor:'#424242',shirt:'#212121',pants:'#212121',shoes:'#212121',eyes:'#000000',hat:'none',glasses:false,headphones:false,beard:true,lanyard:false},
  intern:{skin:'#FDDCB5',hair:'messy',hairColor:'#FFB74D',shirt:'#4CAF50',pants:'#795548',shoes:'#FF5722',eyes:'#000000',hat:'beanie',glasses:false,headphones:true,beard:false,lanyard:true}
};

var toonGradient;
(function(){
  var c=document.createElement('canvas');c.width=4;c.height=1;
  var ctx=c.getContext('2d');
  ctx.fillStyle='#666';ctx.fillRect(0,0,1,1);
  ctx.fillStyle='#999';ctx.fillRect(1,0,1,1);
  ctx.fillStyle='#ccc';ctx.fillRect(2,0,1,1);
  ctx.fillStyle='#fff';ctx.fillRect(3,0,1,1);
  toonGradient=new THREE.CanvasTexture(c);
  toonGradient.minFilter=THREE.NearestFilter;
  toonGradient.magFilter=THREE.NearestFilter;
})();

function makeToon(color){return new THREE.MeshToonMaterial({color:new THREE.Color(color),gradientMap:toonGradient});}

function init(){
  clock=new THREE.Clock();
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1a1a2e);
  var vp=document.getElementById('viewport');
  var w=vp.clientWidth,h=vp.clientHeight;
  camera=new THREE.PerspectiveCamera(35,w/h,0.1,100);
  camera.position.set(0,1.2,4);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(w,h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.2;
  vp.appendChild(renderer.domElement);
  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.target.set(0,0.8,0);
  controls.enableDamping=true;
  controls.dampingFactor=0.08;
  controls.minDistance=2;controls.maxDistance=8;
  controls.update();

  scene.add(new THREE.AmbientLight(0xffffff,0.5));
  var key=new THREE.DirectionalLight(0xffffff,0.8);key.position.set(3,5,4);scene.add(key);
  var fill=new THREE.DirectionalLight(0x88aaff,0.3);fill.position.set(-3,3,-2);scene.add(fill);
  var rim=new THREE.DirectionalLight(0xff8844,0.2);rim.position.set(0,2,-4);scene.add(rim);

  var gGeo=new THREE.CircleGeometry(1.2,48);
  var gMat=new THREE.MeshStandardMaterial({color:0x252540,roughness:0.8});
  var ground=new THREE.Mesh(gGeo,gMat);
  ground.rotation.x=-Math.PI/2;ground.position.y=-0.01;scene.add(ground);
  var grid=new THREE.GridHelper(6,30,0x333355,0x222244);scene.add(grid);

  window.addEventListener('resize',onResize);
  loadModel();
  buildUI();
  animate();
}

function onResize(){
  var vp=document.getElementById('viewport');
  var w=vp.clientWidth,h=vp.clientHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}

function loadModel(){
  var loader=new THREE.GLTFLoader();
  loader.load('assets/funko-base-male.glb',function(gltf){
    baseModel=gltf.scene;
    baseModel.traverse(function(c){if(c.isMesh)console.log('Mesh:',JSON.stringify(c.name));});
    buildCharacter();
  },undefined,function(err){console.error('GLB load error:',err);});
}

function buildCharacter(){
  if(!baseModel)return;
  if(character)scene.remove(character);
  accessories={};hairGroup=null;

  character=baseModel.clone();
  character.scale.set(0.012,0.012,0.012);
  character.position.set(0,0,0);
  character.rotation.set(0,0,0);

  var skinColor=document.getElementById('skinColor').value;
  var shirtColor=document.getElementById('shirtColor').value;
  var pantsColor=document.getElementById('pantsColor').value;
  var eyeColor=document.getElementById('eyeColor').value;
  var headScale=parseFloat(document.getElementById('headScale').value);
  var bodyWidth=parseFloat(document.getElementById('bodyWidth').value);
  var eyeScale=parseFloat(document.getElementById('eyeScale').value);

  character.traverse(function(child){
    if(!child.isMesh)return;
    var n=child.name;
    if(n===MESH_NAMES.head||n===MESH_NAMES.ears||n===MESH_NAMES.hands||n===MESH_NAMES.nose){
      child.material=makeToon(skinColor);
    }
    if(n===MESH_NAMES.eyes){
      child.material=makeToon(eyeColor);
    }
    if(n===MESH_NAMES.upperBody){
      child.material=makeToon(shirtColor);
    }
    if(n===MESH_NAMES.lowerBody){
      child.material=makeToon(pantsColor);
    }
  });

  // proportions
  character.traverse(function(child){
    if(child.name==='Head M'){child.scale.set(headScale,headScale,headScale);}
    if(child.name==='Eyes M'){child.scale.set(eyeScale,eyeScale,eyeScale);}
    if(child.name==='UpperBody M'){child.scale.x=bodyWidth;child.scale.z=bodyWidth;}
    if(child.name==='Hands M'){child.scale.x=bodyWidth;child.scale.z=bodyWidth;}
    if(child.name==='LowerBody F'){child.scale.x=bodyWidth;child.scale.z=bodyWidth;}
  });

  // outlines
  var outMat=new THREE.MeshBasicMaterial({color:0x000000,side:THREE.BackSide});
  character.traverse(function(child){
    if(child.isMesh&&!child.name.startsWith('outline_')){
      var ol=new THREE.Mesh(child.geometry,outMat);
      ol.scale.multiplyScalar(1.03);
      ol.name='outline_'+child.name;
      child.add(ol);
    }
  });

  addHair();
  addAccessories();
  scene.add(character);
}

function addHair(){
  var style=document.getElementById('hairStyle').value;
  var color=document.getElementById('hairColor').value;
  if(style==='none')return;
  hairGroup=new THREE.Group();hairGroup.name='hair';
  var mat=makeToon(color);
  var olMat=new THREE.MeshBasicMaterial({color:0x000000,side:THREE.BackSide});
  var headNode=null;
  character.traverse(function(c){if(c.name==='Head M')headNode=c;});
  if(!headNode)return;

  switch(style){
    case 'buzz':{
      var g=new THREE.SphereGeometry(110,16,12,0,Math.PI*2,0,Math.PI*0.55);
      var m=new THREE.Mesh(g,mat);m.position.set(0,60,-5);hairGroup.add(m);break;
    }
    case 'spiky':{
      for(var i=0;i<12;i++){var a=(i/12)*Math.PI*2;var r=70+Math.random()*30;var h=40+Math.random()*50;
        var g=new THREE.ConeGeometry(15,h,5);var m=new THREE.Mesh(g,mat);
        m.position.set(Math.cos(a)*r,80+Math.random()*20,Math.sin(a)*r-5);
        m.rotation.x=-Math.cos(a)*0.3;m.rotation.z=Math.sin(a)*0.3;hairGroup.add(m);}
      for(var i=0;i<5;i++){var g=new THREE.ConeGeometry(12,60+Math.random()*30,5);var m=new THREE.Mesh(g,mat);
        m.position.set((Math.random()-0.5)*40,100+Math.random()*20,(Math.random()-0.5)*40);hairGroup.add(m);}break;
    }
    case 'slickback':{
      var g=new THREE.SphereGeometry(115,16,12,0,Math.PI*2,0,Math.PI*0.5);
      var m=new THREE.Mesh(g,mat);m.position.set(0,55,-15);m.scale.set(1,0.7,1.2);hairGroup.add(m);break;
    }
    case 'topbun':{
      var g1=new THREE.SphereGeometry(110,16,10,0,Math.PI*2,0,Math.PI*0.45);
      var m1=new THREE.Mesh(g1,mat);m1.position.set(0,60,-5);hairGroup.add(m1);
      var g2=new THREE.SphereGeometry(35,12,12);var m2=new THREE.Mesh(g2,mat);m2.position.set(0,135,-5);hairGroup.add(m2);break;
    }
    case 'ponytail':{
      var g1=new THREE.SphereGeometry(110,16,10,0,Math.PI*2,0,Math.PI*0.5);
      var m1=new THREE.Mesh(g1,mat);m1.position.set(0,55,-5);hairGroup.add(m1);
      var g2=new THREE.CylinderGeometry(18,12,100,8);var m2=new THREE.Mesh(g2,mat);
      m2.position.set(0,30,-100);m2.rotation.x=Math.PI*0.35;hairGroup.add(m2);break;
    }
    case 'afro':{
      var g=new THREE.SphereGeometry(145,20,16);var m=new THREE.Mesh(g,mat);
      m.position.set(0,80,-5);m.scale.set(1,0.85,1);hairGroup.add(m);break;
    }
    case 'mohawk':{
      for(var i=0;i<8;i++){var t=i/7;var g=new THREE.BoxGeometry(12,40+t*25,20);var m=new THREE.Mesh(g,mat);
        m.position.set(0,90+t*10,-80+i*22);hairGroup.add(m);}break;
    }
    case 'sidepart':{
      var g=new THREE.SphereGeometry(115,16,12,0,Math.PI*2,0,Math.PI*0.5);
      var m=new THREE.Mesh(g,mat);m.position.set(10,55,-5);m.scale.set(1.05,0.75,1.1);hairGroup.add(m);break;
    }
    case 'messy':{
      for(var i=0;i<18;i++){var a=(i/18)*Math.PI*2+Math.random()*0.5;var r=80+Math.random()*30;
        var g=new THREE.SphereGeometry(20+Math.random()*15,6,6);var m=new THREE.Mesh(g,mat);
        m.position.set(Math.cos(a)*r,70+Math.random()*40,Math.sin(a)*r-5);hairGroup.add(m);}break;
    }
    case 'curly':{
      for(var i=0;i<25;i++){var a=(i/25)*Math.PI*2+Math.random()*0.3;var r=85+Math.random()*20;var el=Math.random()*Math.PI*0.4;
        var g=new THREE.SphereGeometry(18+Math.random()*10,6,6);var m=new THREE.Mesh(g,mat);
        m.position.set(Math.cos(a)*r*Math.cos(el),60+Math.sin(el)*r,Math.sin(a)*r*Math.cos(el)-5);hairGroup.add(m);}break;
    }
    case 'bob':{
      var g1=new THREE.SphereGeometry(120,16,12,0,Math.PI*2,0,Math.PI*0.55);
      var m1=new THREE.Mesh(g1,mat);m1.position.set(0,50,-5);m1.scale.set(1,0.8,1);hairGroup.add(m1);
      [-1,1].forEach(function(side){var g=new THREE.BoxGeometry(40,80,30);var m=new THREE.Mesh(g,mat);
        m.position.set(side*90,-10,5);hairGroup.add(m);});break;
    }
  }
  hairGroup.traverse(function(c){if(c.isMesh){var ol=new THREE.Mesh(c.geometry,olMat);ol.scale.multiplyScalar(1.04);c.add(ol);}});
  headNode.add(hairGroup);
}

function addAccessories(){
  var headNode=null,bodyNode=null;
  character.traverse(function(c){if(c.name==='Head M')headNode=c;if(c.name==='UpperBody M')bodyNode=c;});
  if(!headNode)return;

  if(document.getElementById('accGlasses').checked){
    var g=new THREE.Group();
    var frameMat=makeToon('#222222');
    var lensMat=new THREE.MeshToonMaterial({color:0x88ccff,transparent:true,opacity:0.3,gradientMap:toonGradient});
    [-35,35].forEach(function(x){
      var rim=new THREE.TorusGeometry(22,3,8,16);var lens=new THREE.CircleGeometry(20,16);
      g.add(new THREE.Mesh(rim,frameMat)).position.set(x,0,0);
      g.add(new THREE.Mesh(lens,lensMat)).position.set(x,0,1);
    });
    var br=new THREE.CylinderGeometry(2,2,20,6);var mBr=new THREE.Mesh(br,frameMat);
    mBr.rotation.z=Math.PI/2;mBr.position.set(0,8,0);g.add(mBr);
    g.position.set(0,-30,125);headNode.add(g);accessories.glasses=g;
  }

  if(document.getElementById('accHeadphones').checked){
    var hg=new THREE.Group();var hMat=makeToon('#333333');
    var band=new THREE.TorusGeometry(100,5,8,24,Math.PI);var mBand=new THREE.Mesh(band,hMat);
    mBand.position.set(0,80,-10);hg.add(mBand);
    [-1,1].forEach(function(side){var pad=new THREE.CylinderGeometry(28,28,18,12);var mPad=new THREE.Mesh(pad,hMat);
      mPad.position.set(side*100,-15,-10);mPad.rotation.z=Math.PI/2;hg.add(mPad);});
    headNode.add(hg);accessories.headphones=hg;
  }

  if(document.getElementById('accBeard').checked){
    var bMat=makeToon(document.getElementById('hairColor').value);
    var bg=new THREE.Group();
    var chin=new THREE.SphereGeometry(55,10,8,0,Math.PI*2,Math.PI*0.4,Math.PI*0.4);
    var mChin=new THREE.Mesh(chin,bMat);mChin.position.set(0,-55,60);mChin.scale.set(1,1.2,0.7);bg.add(mChin);
    headNode.add(bg);accessories.beard=bg;
  }

  var hatStyle=document.getElementById('hatStyle').value;
  if(hatStyle!=='none'){
    var hatGroup=new THREE.Group();
    var hatMat=makeToon(hatStyle==='tophat'?'#111111':'#E53935');
    if(hatStyle==='beanie'){
      var g=new THREE.SphereGeometry(115,16,12,0,Math.PI*2,0,Math.PI*0.45);
      var m=new THREE.Mesh(g,hatMat);m.position.set(0,70,-5);hatGroup.add(m);
      var b=new THREE.SphereGeometry(15,8,8);var mb=new THREE.Mesh(b,makeToon('#FFFFFF'));mb.position.set(0,140,-5);hatGroup.add(mb);
    }else if(hatStyle==='cap'){
      var crown=new THREE.SphereGeometry(115,16,10,0,Math.PI*2,0,Math.PI*0.4);
      var mc=new THREE.Mesh(crown,hatMat);mc.position.set(0,70,-5);hatGroup.add(mc);
      var brim=new THREE.CylinderGeometry(80,90,6,16,1,false,-Math.PI*0.4,Math.PI*0.8);
      var mb2=new THREE.Mesh(brim,hatMat);mb2.position.set(0,60,80);mb2.rotation.x=-0.15;hatGroup.add(mb2);
    }else if(hatStyle==='tophat'){
      var cyl=new THREE.CylinderGeometry(70,70,120,16);var mc2=new THREE.Mesh(cyl,hatMat);mc2.position.set(0,130,-5);hatGroup.add(mc2);
      var brim2=new THREE.CylinderGeometry(110,110,6,24);var mb3=new THREE.Mesh(brim2,hatMat);mb3.position.set(0,72,-5);hatGroup.add(mb3);
    }
    var olMat2=new THREE.MeshBasicMaterial({color:0x000000,side:THREE.BackSide});
    hatGroup.traverse(function(c){if(c.isMesh){var ol=new THREE.Mesh(c.geometry,olMat2);ol.scale.multiplyScalar(1.03);c.add(ol);}});
    headNode.add(hatGroup);accessories.hat=hatGroup;
  }

  if(document.getElementById('accLanyard').checked&&bodyNode){
    var lg=new THREE.Group();var lMat=makeToon('#00BCD4');
    var strap=new THREE.BoxGeometry(3,150,1);var mStrap=new THREE.Mesh(strap,lMat);mStrap.position.set(0,-30,50);lg.add(mStrap);
    var badge=new THREE.BoxGeometry(30,40,3);var mBadge=new THREE.Mesh(badge,makeToon('#FFFFFF'));mBadge.position.set(0,-115,52);lg.add(mBadge);
    bodyNode.add(lg);accessories.lanyard=lg;
  }
}

function setAnim(name){
  currentAnim=name;
  document.querySelectorAll('.btn-row .btn').forEach(function(b,i){
    if(b.parentElement.parentElement.querySelector('.section-title').textContent.includes('Animation')){
      b.classList.toggle('active',b.textContent.toLowerCase().trim()===name);
    }
  });
}

function applyAnimation(dt){
  if(!character)return;
  animTime+=dt;var t=animTime;
  switch(currentAnim){
    case 'idle':character.position.y=Math.sin(t*2)*0.01;character.rotation.x=0;character.rotation.z=0;break;
    case 'walk':character.position.y=Math.abs(Math.sin(t*6))*0.03;character.rotation.z=Math.sin(t*6)*0.05;character.rotation.x=0;break;
    case 'wave':character.position.y=Math.sin(t*2)*0.01;character.rotation.z=Math.sin(t*4)*0.08;break;
    case 'sit':character.position.y=-0.15;character.rotation.x=-0.1;character.rotation.z=0;break;
  }
}

function buildUI(){
  var skinRow=document.getElementById('skinRow');
  SKIN_PRESETS.forEach(function(s){
    var d=document.createElement('div');d.className='color-swatch';d.style.background=s.hex;d.title=s.name;
    d.onclick=function(){document.getElementById('skinColor').value=s.hex;
      document.querySelectorAll('#skinRow .color-swatch').forEach(function(sw){sw.classList.remove('active');});
      d.classList.add('active');buildCharacter();};
    skinRow.appendChild(d);
  });
  var presetRow=document.getElementById('presetRow');
  Object.keys(ROLE_PRESETS).forEach(function(role){
    var b=document.createElement('button');b.className='btn';
    b.textContent=role.charAt(0).toUpperCase()+role.slice(1);
    b.onclick=function(){applyPreset(role);};presetRow.appendChild(b);
  });
  var ids=['skinColor','hairStyle','hairColor','shirtColor','pantsColor','shoeColor','eyeColor','eyeScale','headScale','bodyWidth','accGlasses','accHeadphones','accBeard','hatStyle','accLanyard'];
  ids.forEach(function(id){
    var el=document.getElementById(id);
    el.addEventListener('input',function(){updateValDisplays();buildCharacter();});
    el.addEventListener('change',function(){updateValDisplays();buildCharacter();});
  });
}

function updateValDisplays(){
  [['eyeScale','eyeScaleVal'],['headScale','headScaleVal'],['bodyWidth','bodyWidthVal']].forEach(function(p){
    var el=document.getElementById(p[1]);if(el)el.textContent=parseFloat(document.getElementById(p[0]).value).toFixed(2);
  });
}

function applyPreset(role){
  var p=ROLE_PRESETS[role];
  document.getElementById('skinColor').value=p.skin;
  document.getElementById('hairStyle').value=p.hair;
  document.getElementById('hairColor').value=p.hairColor;
  document.getElementById('shirtColor').value=p.shirt;
  document.getElementById('pantsColor').value=p.pants;
  document.getElementById('shoeColor').value=p.shoes;
  document.getElementById('eyeColor').value=p.eyes;
  document.getElementById('hatStyle').value=p.hat;
  document.getElementById('accGlasses').checked=p.glasses;
  document.getElementById('accHeadphones').checked=p.headphones;
  document.getElementById('accBeard').checked=p.beard;
  document.getElementById('accLanyard').checked=!!p.lanyard;
  document.getElementById('headScale').value=1.0;
  document.getElementById('bodyWidth').value=1.0;
  document.getElementById('eyeScale').value=1.0;
  updateValDisplays();buildCharacter();
}

function randomize(){
  var skins=SKIN_PRESETS.map(function(s){return s.hex;});
  var hairs=['none','buzz','spiky','slickback','topbun','ponytail','afro','mohawk','sidepart','messy','curly','bob'];
  var hats=['none','none','none','beanie','cap','tophat'];
  var rc=function(){return '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');};
  document.getElementById('skinColor').value=skins[Math.floor(Math.random()*skins.length)];
  document.getElementById('hairStyle').value=hairs[Math.floor(Math.random()*hairs.length)];
  document.getElementById('hairColor').value=rc();
  document.getElementById('shirtColor').value=rc();
  document.getElementById('pantsColor').value=rc();
  document.getElementById('shoeColor').value=rc();
  document.getElementById('eyeColor').value='#000000';
  document.getElementById('hatStyle').value=hats[Math.floor(Math.random()*hats.length)];
  document.getElementById('accGlasses').checked=Math.random()>0.7;
  document.getElementById('accHeadphones').checked=Math.random()>0.7;
  document.getElementById('accBeard').checked=Math.random()>0.8;
  document.getElementById('accLanyard').checked=Math.random()>0.6;
  document.getElementById('headScale').value=0.9+Math.random()*0.25;
  document.getElementById('bodyWidth').value=0.85+Math.random()*0.35;
  document.getElementById('eyeScale').value=0.7+Math.random()*0.8;
  updateValDisplays();buildCharacter();
}

function copyJSON(){
  var data={skin:document.getElementById('skinColor').value,hair:document.getElementById('hairStyle').value,
    hairColor:document.getElementById('hairColor').value,shirt:document.getElementById('shirtColor').value,
    pants:document.getElementById('pantsColor').value,shoes:document.getElementById('shoeColor').value,
    eyes:document.getElementById('eyeColor').value,eyeScale:parseFloat(document.getElementById('eyeScale').value),
    headScale:parseFloat(document.getElementById('headScale').value),bodyWidth:parseFloat(document.getElementById('bodyWidth').value),
    hat:document.getElementById('hatStyle').value,glasses:document.getElementById('accGlasses').checked,
    headphones:document.getElementById('accHeadphones').checked,beard:document.getElementById('accBeard').checked,
    lanyard:document.getElementById('accLanyard').checked};
  navigator.clipboard.writeText(JSON.stringify(data,null,2));alert('Character JSON copied!');
}

function animate(){
  requestAnimationFrame(animate);var dt=clock.getDelta();
  applyAnimation(dt);
  if(document.getElementById('turntable').checked&&character)character.rotation.y+=dt*0.5;
  controls.update();renderer.render(scene,camera);
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burn Rate — Character Editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:'Inter',sans-serif;color:#fff;}
#app{display:flex;width:100%;height:100%;}
#viewport{flex:0 0 65%;height:100%;position:relative;}
#viewport canvas{display:block;}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:#00d4ff;text-align:center;}
#loading .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#00d4ff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
#panel{flex:0 0 35%;height:100%;overflow-y:auto;background:#16213e;border-left:1px solid #333;padding:16px;}
#panel::-webkit-scrollbar{width:6px;}
#panel::-webkit-scrollbar-track{background:#16213e;}
#panel::-webkit-scrollbar-thumb{background:#00d4ff44;border-radius:3px;}
.section{margin-bottom:16px;}
.section-title{font-size:13px;font-weight:700;color:#00d4ff;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #333;}
.ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:12px;}
.ctrl label{flex:0 0 40%;color:#ccc;}
.ctrl select{flex:1;background:#0f1a30;color:#fff;border:1px solid #444;border-radius:4px;padding:4px 8px;font-size:11px;}
.ctrl input[type=checkbox]{accent-color:#00d4ff;width:16px;height:16px;}
.ctrl input[type=range]{flex:1;accent-color:#00d4ff;}
.val{color:#00d4ff;font-size:10px;width:32px;text-align:right;margin-left:4px;}
.btn-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.btn{padding:6px 12px;border:1px solid #444;border-radius:6px;background:#0f1a30;color:#fff;font-size:11px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:#00d4ff;background:#1a2a4e;box-shadow:0 0 8px #00d4ff33;}
.btn.active{border-color:#00d4ff;background:#00d4ff22;color:#00d4ff;}
.btn.accent{background:linear-gradient(135deg,#00d4ff,#a78bfa);color:#fff;border:none;font-weight:700;}
.mesh-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px;}
.mesh-toggle{padding:5px 8px;border:1px solid #333;border-radius:4px;background:#0f1a30;color:#999;font-size:10px;cursor:pointer;text-align:center;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mesh-toggle.on{border-color:#00d4ff;color:#00d4ff;background:#00d4ff15;}
.mesh-toggle:hover{border-color:#666;}
.role-tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;margin:2px;cursor:pointer;transition:all .2s;border:1px solid transparent;}
.role-tag:hover{opacity:0.9;}
.role-tag.active{border-color:#fff;box-shadow:0 0 6px rgba(255,255,255,0.3);}
.role-tag.engineer{background:#3b82f6;color:#fff;}
.role-tag.designer{background:#ec4899;color:#fff;}
.role-tag.sales{background:#22c55e;color:#fff;}
.role-tag.pm{background:#f59e0b;color:#fff;}
.role-tag.ceo{background:#8b5cf6;color:#fff;}
.role-tag.intern{background:#06b6d4;color:#fff;}
.info{font-size:10px;color:#666;margin-top:4px;line-height:1.3;}
</style>
</head>
<body>
<div id="app">
<div id="viewport">
  <div id="loading"><div class="spinner"></div>Loading character model...</div>
</div>
<div id="panel">

<div class="section">
<div class="section-title">📋 Role Presets</div>
<div class="btn-row" id="roleButtons">
<span class="role-tag engineer active" onclick="loadRole('engineer',this)">👨‍💻 Engineer</span>
<span class="role-tag designer" onclick="loadRole('designer',this)">🎨 Designer</span>
<span class="role-tag sales" onclick="loadRole('sales',this)">💼 Sales</span>
<span class="role-tag pm" onclick="loadRole('pm',this)">📊 PM</span>
<span class="role-tag ceo" onclick="loadRole('ceo',this)">👔 CEO</span>
<span class="role-tag intern" onclick="loadRole('intern',this)">🎓 Intern</span>
</div>
</div>

<div class="section">
<div class="section-title">😊 Face / Emotion</div>
<div class="mesh-grid" id="emotionGrid"></div>
</div>

<div class="section">
<div class="section-title">💇 Hair</div>
<div class="mesh-grid" id="hairGrid"></div>
</div>

<div class="section">
<div class="section-title">👕 Top</div>
<div class="mesh-grid" id="topGrid"></div>
</div>

<div class="section">
<div class="section-title">🧥 Outerwear</div>
<div class="mesh-grid" id="outerwearGrid"></div>
</div>

<div class="section">
<div class="section-title">👖 Bottoms</div>
<div class="mesh-grid" id="bottomsGrid"></div>
</div>

<div class="section">
<div class="section-title">👟 Shoes</div>
<div class="mesh-grid" id="shoesGrid"></div>
</div>

<div class="section">
<div class="section-title">🎩 Headwear</div>
<div class="mesh-grid" id="hatGrid"></div>
</div>

<div class="section">
<div class="section-title">👓 Accessories</div>
<div class="mesh-grid" id="accessoryGrid"></div>
</div>

<div class="section">
<div class="section-title">🎬 Animation</div>
<div class="btn-row">
<button class="btn active" onclick="setAnim('idle',this)">Idle</button>
<button class="btn" onclick="setAnim('walk',this)">Walk</button>
<button class="btn" onclick="setAnim('sit',this)">Sit</button>
<button class="btn" onclick="setAnim('celebrate',this)">Celebrate</button>
</div>
<div class="ctrl"><label>Turntable</label><input type="checkbox" id="turntable" checked></div>
<div class="ctrl"><label>Speed</label><input type="range" id="animSpeed" min="0.2" max="3" step="0.1" value="1"><span class="val" id="animSpeedV">1.0</span></div>
</div>

<div class="section">
<div class="section-title">⚙️ Display</div>
<div class="ctrl"><label>Scale</label><input type="range" id="charScale" min="0.3" max="1.2" step="0.05" value="0.55"><span class="val" id="charScaleV">0.55</span></div>
<div class="ctrl"><label>Background</label><select id="bgColor" onchange="setBg(this.value)">
<option value="#cccccc">Light Gray</option>
<option value="#1a1a2e" selected>Dark Blue</option>
<option value="#111111">Near Black</option>
<option value="#2d5016">Forest</option>
<option value="#f5f5dc">Beige</option>
</select></div>
</div>

<div class="section">
<div class="section-title">💾 Export</div>
<div class="btn-row">
<button class="btn accent" onclick="copyConfig()">📋 Copy Config</button>
<button class="btn" onclick="randomize()">🎲 Randomize</button>
</div>
<div class="info">Config exports as JSON — paste into game code to create this character.</div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.143.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.143.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.143.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.143.0/examples/js/utils/SkeletonUtils.js"></script>
<script>
var PARTS = {
  body: ['Body_010'],
  emotion: ['Male_emotion_happy_002', 'Male_emotion_usual_001', 'Male_emotion_angry_003'],
  hair: ['Hairstyle_male_010', 'Hairstyle_male_012'],
  top: ['T_Shirt_009', 'Costume_10_001', 'Costume_6_001'],
  outerwear: ['Outerwear_029', 'Outerwear_036'],
  pants: ['Pants_010', 'Pants_014'],
  shorts: ['Shorts_003'],
  shoes: ['Shoe_Sneakers_009', 'Shoe_Slippers_002', 'Shoe_Slippers_005'],
  hat: ['Hat_010', 'Hat_049'],
  glasses: ['Glasses_004'],
  headphones: ['Headphones_002'],
  gloves: ['Gloves_006', 'Gloves_014'],
  moustache: ['Moustache_001', 'Moustache_002'],
  clown_nose: ['Clown_nose_001'],
  pacifier: ['Pacifier_001'],
  socks: ['Socks_008']
};

var PART_NAMES = {
  'Body_010': 'Body',
  'Male_emotion_happy_002': 'Happy 😊', 'Male_emotion_usual_001': 'Neutral 😐', 'Male_emotion_angry_003': 'Angry 😠',
  'Hairstyle_male_010': 'Hair A', 'Hairstyle_male_012': 'Hair B',
  'T_Shirt_009': 'T-Shirt', 'Costume_10_001': 'Costume A', 'Costume_6_001': 'Costume B',
  'Outerwear_029': 'Jacket', 'Outerwear_036': 'Coat',
  'Pants_010': 'Pants A', 'Pants_014': 'Pants B', 'Shorts_003': 'Shorts',
  'Shoe_Sneakers_009': 'Sneakers', 'Shoe_Slippers_002': 'Slippers A', 'Shoe_Slippers_005': 'Slippers B',
  'Hat_010': 'Hat A', 'Hat_049': 'Hat B',
  'Glasses_004': 'Glasses',
  'Headphones_002': 'Headphones',
  'Gloves_006': 'Gloves A', 'Gloves_014': 'Gloves B',
  'Moustache_001': 'Moustache A', 'Moustache_002': 'Moustache B',
  'Clown_nose_001': 'Clown Nose', 'Pacifier_001': 'Pacifier', 'Socks_008': 'Socks'
};

var ROLE_OUTFITS = {
  engineer: { emotion:'Male_emotion_usual_001', hair:'Hairstyle_male_010', top:'T_Shirt_009', pants:'Pants_010', shoes:'Shoe_Sneakers_009', optional:['Glasses_004','Headphones_002'] },
  designer: { emotion:'Male_emotion_happy_002', hair:'Hairstyle_male_012', top:'Costume_10_001', pants:'Pants_014', shoes:'Shoe_Slippers_002', optional:['Hat_010'] },
  sales: { emotion:'Male_emotion_happy_002', hair:'Hairstyle_male_010', top:'Costume_6_001', outerwear:'Outerwear_029', pants:'Pants_010', shoes:'Shoe_Slippers_005', optional:[] },
  pm: { emotion:'Male_emotion_usual_001', hair:'Hairstyle_male_012', top:'T_Shirt_009', outerwear:'Outerwear_036', pants:'Pants_014', shoes:'Shoe_Sneakers_009', optional:['Glasses_004'] },
  ceo: { emotion:'Male_emotion_happy_002', hair:'Hairstyle_male_010', top:'Costume_6_001', outerwear:'Outerwear_029', pants:'Pants_010', shoes:'Shoe_Slippers_005', optional:['Glasses_004','Moustache_001'] },
  intern: { emotion:'Male_emotion_happy_002', hair:'Hairstyle_male_010', top:'T_Shirt_009', pants:'Shorts_003', shoes:'Shoe_Sneakers_009', optional:['Hat_049'] }
};

// === THREE.JS SETUP ===
var container = document.getElementById('viewport');
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
var camera = new THREE.PerspectiveCamera(35, container.clientWidth/container.clientHeight, 0.1, 100);
camera.position.set(0, 1.2, 3.5);
var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.7, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
var key = new THREE.DirectionalLight(0xffffff, 0.8);
key.position.set(3,5,4); key.castShadow=true; scene.add(key);
scene.add(new THREE.DirectionalLight(0x88aaff,0.3)).position.set(-2,3,-2);
scene.add(new THREE.DirectionalLight(0xffd4a0,0.4)).position.set(0,2,-4);

var floorMat = new THREE.MeshStandardMaterial({color:0x333355,metalness:0.2,roughness:0.8});
var floor = new THREE.Mesh(new THREE.CircleGeometry(1.5,64), floorMat);
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
var grid = new THREE.GridHelper(6,30,0x444466,0x333355);
grid.position.y=0.001; scene.add(grid);

// === GLB CHARACTER ===
var glbModel=null, charWrapper=null, allMeshes={}, boneMap={}, restPoses={};
var currentAnim='idle', animTime=0, currentRole='engineer';
var nameMap = {};

var loader = new THREE.GLTFLoader();
loader.load('assets/creative-character.glb', function(gltf) {
  glbModel = gltf;
  document.getElementById('loading').style.display = 'none';
  var meshNames = [];
  gltf.scene.traverse(function(c) { if(c.isMesh||c.isSkinnedMesh) meshNames.push(c.name); });
  console.log('[Editor] GLB meshes:', meshNames);
  buildMeshNameMapping(meshNames);
  buildUI();
  spawnCharacter();
  loadRole('engineer');
}, function(p) {
  if(p.total>0) document.getElementById('loading').innerHTML='<div class="spinner"></div>Loading... '+Math.round(p.loaded/p.total*100)+'%';
}, function(err) {
  document.getElementById('loading').innerHTML='❌ Failed to load model.<br>'+err.message;
});

function buildMeshNameMapping(actualNames) {
  var allAssumed=[];
  Object.values(PARTS).forEach(function(a){allAssumed=allAssumed.concat(a);});
  allAssumed.forEach(function(n){ if(actualNames.indexOf(n)>=0) nameMap[n]=n; });
  if(Object.keys(nameMap).length===0 && actualNames.length>0) {
    console.log('[Editor] No name matches, mapping by index');
    var idx=0;
    Object.keys(PARTS).forEach(function(cat){
      PARTS[cat].forEach(function(assumed){ if(idx<actualNames.length){nameMap[assumed]=actualNames[idx];idx++;} });
    });
  }
  console.log('[Editor] Name map:', nameMap);
}

function spawnCharacter() {
  if(charWrapper) scene.remove(charWrapper);
  var source = glbModel.scene;
  var clone = THREE.SkeletonUtils ? THREE.SkeletonUtils.clone(source) : source.clone(true);
  charWrapper = new THREE.Group();
  var scale = parseFloat(document.getElementById('charScale').value)||0.55;
  clone.scale.setScalar(scale);
  charWrapper.add(clone);
  allMeshes={}; boneMap={}; restPoses={};
  clone.traverse(function(child){
    if(child.isMesh||child.isSkinnedMesh){allMeshes[child.name]=child;child.visible=false;child.castShadow=true;child.receiveShadow=true;child.frustumCulled=false;}
    if(child.isBone){boneMap[child.name]=child;restPoses[child.name]=child.quaternion.clone();}
  });
  scene.add(charWrapper);
  showMesh('Body_010',true);
}

function showMesh(assumed,vis){var actual=nameMap[assumed]||assumed;if(allMeshes[actual])allMeshes[actual].visible=vis;}
function isMeshVisible(assumed){var actual=nameMap[assumed]||assumed;return allMeshes[actual]?allMeshes[actual].visible:false;}
function toggleMesh(assumed){var actual=nameMap[assumed]||assumed;if(allMeshes[actual])allMeshes[actual].visible=!allMeshes[actual].visible;updateToggleButtons();}

function buildUI(){
  buildMeshGrid('emotionGrid',PARTS.emotion,true);
  buildMeshGrid('hairGrid',PARTS.hair,true);
  buildMeshGrid('topGrid',PARTS.top,true);
  buildMeshGrid('outerwearGrid',PARTS.outerwear,false);
  buildMeshGrid('bottomsGrid',PARTS.pants.concat(PARTS.shorts),true);
  buildMeshGrid('shoesGrid',PARTS.shoes,true);
  buildMeshGrid('hatGrid',PARTS.hat,false);
  var accParts=PARTS.glasses.concat(PARTS.headphones,PARTS.gloves,PARTS.moustache,PARTS.clown_nose,PARTS.pacifier,PARTS.socks);
  buildMeshGrid('accessoryGrid',accParts,false);
}

function buildMeshGrid(containerId,parts,exclusive){
  var cont=document.getElementById(containerId);if(!cont)return;cont.innerHTML='';
  parts.forEach(function(partName){
    var btn=document.createElement('div');
    btn.className='mesh-toggle';btn.textContent=PART_NAMES[partName]||partName;
    btn.dataset.mesh=partName;btn.dataset.group=containerId;
    btn.onclick=function(){
      if(exclusive){
        var sibs=cont.querySelectorAll('.mesh-toggle');
        sibs.forEach(function(s){showMesh(s.dataset.mesh,false);});
        showMesh(partName,true);
      } else { toggleMesh(partName); }
      updateToggleButtons();
    };
    cont.appendChild(btn);
  });
}

function updateToggleButtons(){
  document.querySelectorAll('.mesh-toggle').forEach(function(btn){btn.classList.toggle('on',isMeshVisible(btn.dataset.mesh));});
}

function loadRole(role,btnEl){
  currentRole=role;
  document.querySelectorAll('.role-tag').forEach(function(b){b.classList.remove('active');});
  if(btnEl){btnEl.classList.add('active');}
  else{var rb=document.querySelector('.role-tag.'+role);if(rb)rb.classList.add('active');}
  var outfit=ROLE_OUTFITS[role];if(!outfit)return;
  Object.keys(allMeshes).forEach(function(name){allMeshes[name].visible=false;});
  showMesh('Body_010',true);
  if(outfit.emotion)showMesh(outfit.emotion,true);
  if(outfit.hair)showMesh(outfit.hair,true);
  if(outfit.top)showMesh(outfit.top,true);
  if(outfit.outerwear)showMesh(outfit.outerwear,true);
  if(outfit.pants)showMesh(outfit.pants,true);
  if(outfit.shoes)showMesh(outfit.shoes,true);
  if(outfit.optional)outfit.optional.forEach(function(o){showMesh(o,true);});
  updateToggleButtons();
}

// === ANIMATIONS ===
function setAnim(name,btn){
  currentAnim=name;animTime=0;resetBones();if(charWrapper)charWrapper.position.y=0;
  document.querySelectorAll('#panel .btn-row .btn').forEach(function(b){if(b.parentElement===btn.parentElement)b.classList.remove('active');});
  btn.classList.add('active');
}

function resetBones(){Object.keys(restPoses).forEach(function(n){if(boneMap[n])boneMap[n].quaternion.copy(restPoses[n]);});}

function applyBoneRot(name,axis,angle){
  if(!boneMap[name])return;
  var q=new THREE.Quaternion();q.setFromAxisAngle(axis,angle);boneMap[name].quaternion.multiply(q);
}

var axisX=new THREE.Vector3(1,0,0),axisY=new THREE.Vector3(0,1,0),axisZ=new THREE.Vector3(0,0,1);

function animateCharacter(dt){
  animTime+=dt;
  var speed=parseFloat(document.getElementById('animSpeed').value)||1;
  var t=animTime*speed;
  resetBones();
  if(charWrapper)charWrapper.position.y=0;

  if(currentAnim==='idle'){
    applyBoneRot('Spine',axisX,Math.sin(t*1.5)*0.02);
    applyBoneRot('Head',axisX,Math.sin(t*0.8)*0.03);
    applyBoneRot('Head',axisY,Math.sin(t*0.5)*0.02);
    applyBoneRot('LeftArm',axisX,Math.sin(t*0.7)*0.03);
    applyBoneRot('RightArm',axisX,Math.sin(t*0.7+0.5)*0.03);
  } else if(currentAnim==='walk'){
    var wt=t*4,stride=0.4,armSw=0.3;
    var lL=Math.sin(wt)*stride,lR=Math.sin(wt+Math.PI)*stride;
    applyBoneRot('LeftUpLeg',axisX,lL);applyBoneRot('RightUpLeg',axisX,lR);
    applyBoneRot('LeftLeg',axisX,Math.max(0,-lL)*1.2+0.15);applyBoneRot('RightLeg',axisX,Math.max(0,-lR)*1.2+0.15);
    applyBoneRot('LeftArm',axisX,Math.sin(wt+Math.PI)*armSw-0.2);applyBoneRot('RightArm',axisX,Math.sin(wt)*armSw-0.2);
    applyBoneRot('LeftForeArm',axisX,-0.3+Math.sin(wt+Math.PI)*0.15);applyBoneRot('RightForeArm',axisX,-0.3+Math.sin(wt)*0.15);
    applyBoneRot('Spine',axisY,Math.sin(wt)*0.06);applyBoneRot('Head',axisX,Math.sin(wt*2)*0.04);
    if(charWrapper)charWrapper.position.y=Math.abs(Math.sin(wt))*0.02;
  } else if(currentAnim==='sit'){
    applyBoneRot('LeftUpLeg',axisX,-1.3);applyBoneRot('RightUpLeg',axisX,-1.3);
    applyBoneRot('LeftLeg',axisX,1.5);applyBoneRot('RightLeg',axisX,1.5);
    applyBoneRot('Spine',axisX,-0.1);applyBoneRot('Spine1',axisX,-0.1);
    applyBoneRot('LeftArm',axisX,-0.4);applyBoneRot('RightArm',axisX,-0.4);
    applyBoneRot('LeftForeArm',axisX,-0.6+Math.sin(t*6)*0.05);applyBoneRot('RightForeArm',axisX,-0.6+Math.sin(t*6+1.5)*0.05);
    applyBoneRot('Head',axisX,0.15);applyBoneRot('Head',axisY,Math.sin(t*0.8)*0.04);
  } else if(currentAnim==='celebrate'){
    applyBoneRot('LeftArm',axisZ,-Math.PI*0.55+Math.sin(t*4)*0.15);
    applyBoneRot('RightArm',axisZ,Math.PI*0.55+Math.sin(t*4+1)*0.15);
    applyBoneRot('LeftForeArm',axisX,-0.5+Math.sin(t*5)*0.3);applyBoneRot('RightForeArm',axisX,-0.5+Math.sin(t*5+1)*0.3);
    if(charWrapper)charWrapper.position.y=Math.abs(Math.sin(t*5))*0.06;
    applyBoneRot('Head',axisZ,Math.sin(t*3)*0.1);applyBoneRot('Spine',axisX,Math.sin(t*3)*0.05);
  }
}

// === CONTROLS ===
document.getElementById('animSpeed').addEventListener('input',function(){document.getElementById('animSpeedV').textContent=parseFloat(this.value).toFixed(1);});
document.getElementById('charScale').addEventListener('input',function(){
  document.getElementById('charScaleV').textContent=parseFloat(this.value).toFixed(2);
  if(charWrapper&&charWrapper.children[0])charWrapper.children[0].scale.setScalar(parseFloat(this.value));
});
function setBg(c){scene.background=new THREE.Color(c);}

function randomize(){
  Object.keys(allMeshes).forEach(function(n){allMeshes[n].visible=false;});
  showMesh('Body_010',true);
  function pick(a){return a[Math.floor(Math.random()*a.length)];}
  showMesh(pick(PARTS.emotion),true);showMesh(pick(PARTS.hair),true);showMesh(pick(PARTS.top),true);
  if(Math.random()>0.5)showMesh(pick(PARTS.outerwear),true);
  if(Math.random()>0.3)showMesh(pick(PARTS.pants),true);else showMesh(PARTS.shorts[0],true);
  showMesh(pick(PARTS.shoes),true);
  if(Math.random()>0.6)showMesh(pick(PARTS.hat),true);
  if(Math.random()>0.6)showMesh(pick(PARTS.glasses),true);
  if(Math.random()>0.7)showMesh(pick(PARTS.headphones),true);
  if(Math.random()>0.8)showMesh(pick(PARTS.moustache),true);
  if(Math.random()>0.95)showMesh(PARTS.clown_nose[0],true);
  updateToggleButtons();
}

function copyConfig(){
  var config={role:currentRole,visibleMeshes:[],scale:parseFloat(document.getElementById('charScale').value),animation:currentAnim};
  Object.keys(allMeshes).forEach(function(name){
    if(allMeshes[name].visible){
      var assumed=name;Object.keys(nameMap).forEach(function(k){if(nameMap[k]===name)assumed=k;});
      config.visibleMeshes.push(assumed);
    }
  });
  navigator.clipboard.writeText(JSON.stringify(config,null,2)).then(function(){alert('Character config copied!');});
}

// === RENDER LOOP ===
var clock=new THREE.Clock(),turntableAngle=0;
function animate(){
  requestAnimationFrame(animate);
  var dt=clock.getDelta();
  if(document.getElementById('turntable').checked&&charWrapper){turntableAngle+=dt*0.5;charWrapper.rotation.y=turntableAngle;}
  if(Object.keys(boneMap).length>0)animateCharacter(dt);
  controls.update();renderer.render(scene,camera);
}
window.addEventListener('resize',function(){camera.aspect=container.clientWidth/container.clientHeight;camera.updateProjectionMatrix();renderer.setSize(container.clientWidth,container.clientHeight);});
animate();
</script>
